<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หน้าครัว</title>

<style>
body{
  font-family:sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:20px;
}

h2{
  text-align:center;
}

#orders{
  max-width:700px;
  margin:auto;
}

.order{
  background:white;
  margin:10px 0;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  animation:fadeIn .3s ease;
}

.order h3{
  margin:0 0 8px;
}

.order p{
  margin:0 0 12px;
  font-size:18px;
}

button{
  background:#d62828;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-2px);
}

button:active{
  transform:scale(.95);
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>
<body>

<h2>📋 ออเดอร์</h2>
<div id="orders">กำลังโหลด...</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzy4d4Xd9qrLGsrzTRd1mioRfv4U42kmTkPK_8LOCniaUAdoGiYfUWcDPBTCBFP6pAk/exec";
let finishedOrders = new Set();

function loadOrders(){
  const oldScript = document.getElementById("jsonp");
  if(oldScript) oldScript.remove();

  const script = document.createElement("script");
  script.id = "jsonp";
  script.src = URL + "?callback=showData&time=" + Date.now();
  document.body.appendChild(script);
}

function showData(data){
  let html = "";

  if(!data || data.length === 0){
    html = "<p style='text-align:center;'>ยังไม่มีออเดอร์</p>";
  }else{
    data.forEach(row => {

      if(finishedOrders.has(row.row)) return;

      html += `
        <div class="order" data-row="${row.row}">
          <h3>โต๊ะ ${row.table}</h3>
          <p>${row.item} x ${row.qty}</p>
          <button onclick="finishOrder(${row.row})">
            เสร็จแล้ว
          </button>
        </div>
      `;
    });

    if(html === ""){
      html = "<p style='text-align:center;'>ยังไม่มีออเดอร์</p>";
    }
  }

  const box = document.getElementById("orders");

  if(box.innerHTML !== html){
    box.innerHTML = html;
  }
}

function finishOrder(rowNumber){
  finishedOrders.add(rowNumber);

  const card = document.querySelector(`[data-row="${rowNumber}"]`);
  if(card){
    card.style.opacity = "0";
    card.style.transform = "translateX(50px)";
    card.style.transition = ".25s";

    setTimeout(()=>{
      card.remove();
    },250);
  }

  fetch(URL,{
    method:"POST",
    body:JSON.stringify({
      action:"delete",
      row:rowNumber
    })
  })
  .then(res => res.text())
  .then(()=>{
    setTimeout(loadOrders,500);
  });
}

setInterval(loadOrders,5000);
loadOrders();
</script>

</body>
</html>
