<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>หน้าครัว</title>

<style>
body{
  font-family:sans-serif;
  background:#f5f5f5;
}

.order{
  background:white;
  margin:10px;
  padding:15px;
  border-radius:10px;
}

button{
  background:red;
  color:white;
  border:none;
  padding:5px 10px;
  border-radius:6px;
}
</style>
</head>
<body>

<h2>📋 ออเดอร์</h2>
<div id="orders"></div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzy4d4Xd9qrLGsrzTRd1mioRfv4U42kmTkPK_8LOCniaUAdoGiYfUWcDPBTCBFP6pAk/exec";

function loadOrders(){
  const script = document.createElement("script");
  script.src = URL + "?callback=showData&t=" + Date.now();
  document.body.appendChild(script);
}

function showData(data){
  let html = "";

  if(data.length == 0){
    html = "<h3>ยังไม่มีออเดอร์</h3>";
  }else{
    data.forEach(row=>{
      html += `
        <div class="order">
          <h3>โต๊ะ ${row.table}</h3>
          <p>${row.item} x ${row.qty}</p>
          <button onclick="finishOrder(${row.row})">เสร็จแล้ว</button>
        </div>
      `;
    });
  }

  document.getElementById("orders").innerHTML = html;
}

function finishOrder(rowNumber){
  fetch(URL,{
    method:"POST",
    body:JSON.stringify({
      action:"delete",
      row:rowNumber
    })
  }).then(()=>{
    loadOrders();
  });
}

setInterval(loadOrders,3000);
loadOrders();
</script>

</body>
</html>
